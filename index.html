<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarBet Live</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #007aff;
            --text: #ffffff;
            --gray: #8e8e93;
            --red: #ff3b30;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px 15px 80px 15px;
        }

        .tabs {
            display: flex; gap: 8px; margin-bottom: 20px;
            position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 10px 0;
        }

        .tab {
            flex: 1; padding: 12px; text-align: center;
            background: var(--card); border-radius: 12px;
            font-size: 13px; font-weight: 600; color: var(--gray);
            transition: 0.2s; border: 1px solid #222;
        }

        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .match-card {
            background: var(--card); border-radius: 16px;
            padding: 20px; margin-bottom: 12px;
            border: 1px solid #222;
            display: flex; align-items: center; justify-content: space-between;
        }

        .team { width: 35%; text-align: center; font-size: 14px; font-weight: 500; }
        .score-box { width: 30%; text-align: center; }
        .score { font-size: 24px; font-weight: 800; letter-spacing: 2px; }
        .status { font-size: 10px; color: var(--gray); text-transform: uppercase; margin-top: 5px; }
        .live { color: var(--red); font-weight: bold; }

        #loader { text-align: center; margin-top: 50px; color: var(--accent); font-weight: bold; }
        #error-msg { text-align: center; color: var(--red); display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="changeTab('live', this)">Live</div>
        <div class="tab" onclick="changeTab('scheduled', this)">Сегодня</div>
        <div class="tab" onclick="changeTab('search', this)">Поиск</div>
    </div>

    <div id="loader">Загрузка данных...</div>
    <div id="error-msg">Ошибка доступа. Проверьте VPN и лимиты API.</div>
    <div id="content"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const API_KEY = '0bc1450aaemsh5f9908516db2655p12ebf3jsnbc91931d708a';
        const HOST = 'free-api-live-football-data.p.rapidapi.com';

        async function loadMatches(type) {
            const container = document.getElementById('content');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('error-msg');
            
            loader.style.display = 'block';
            errorMsg.style.display = 'none';
            container.innerHTML = '';

            // Выбираем эндпоинт в зависимости от вкладки
            let url = `https://${HOST}/football/live`;
            if (type === 'scheduled') url = `https://${HOST}/football/fixtures-day?date=20260320`;
            if (type === 'search') url = `https://${HOST}/football/get-search-players?query=Messi`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': HOST }
                });
                const result = await response.json();
                
                // Обрабатываем данные (в этом API список может лежать в result.data)
                const matches = result.data || result || [];
                render(matches);
            } catch (err) {
                console.error(err);
                errorMsg.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }

        function render(items) {
            const container = document.getElementById('content');
            if (!items || items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:gray;">Нет активных событий</p>';
                return;
            }

            items.slice(0, 20).forEach(m => {
                const card = document.createElement('div');
                card.className = 'match-card';
                
                // Адаптируем под структуру "Free API Live Football Data"
                const homeName = m.home_team_name || m.home_name || 'Home';
                const awayName = m.away_team_name || m.away_name || 'Away';
                const homeScore = m.home_score ?? 0;
                const awayScore = m.away_score ?? 0;
                const status = m.status || 'Match';

                card.innerHTML = `
                    <div class="team">${homeName}</div>
                    <div class="score-box">
                        <div class="score">${homeScore}:${awayScore}</div>
                        <div class="status ${status === 'Live' ? 'live' : ''}">${status}</div>
                    </div>
                    <div class="team">${awayName}</div>
                `;
                container.appendChild(card);
            });
        }

        function changeTab(type, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            loadMatches(type);
        }

        // Первый запуск
        loadMatches('live');
    </script>
</body>
</html>
