<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarBet Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161618;
            --accent-color: #007aff;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --success: #34c759;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 22px; margin-bottom: 20px; width: 100%; text-align: left; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #2c2c2e;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .rating-val {
            font-size: 32px;
            font-weight: 800;
            color: var(--success);
            margin: 10px 0;
        }

        .label { color: var(--text-secondary); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }

        #loader { color: var(--accent-color); font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>StarBet Statistics</h1>

    <div id="content" style="display: none; width: 100%;">
        <div class="card">
            <div class="label">Рейтинг игрока (Live)</div>
            <div id="player-rating" class="rating-val">0.0</div>
            <div id="update-time" style="font-size: 12px; color: var(--text-secondary);">Обновлено только что</div>
        </div>
        
        <button onclick="loadData()">Обновить данные</button>
    </div>

    <div id="loader">Загрузка данных из API...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Твой API Ключ
        const API_KEY = '0bc1450aaemsh5f9908516db2655p12ebf3jsnbc91931d708a';

        async function loadData() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('content').style.display = 'none';

            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': API_KEY,
                    'x-rapidapi-host': 'sportapi7.p.rapidapi.com'
                }
            };

            try {
                // Запрос к API (из твоего скриншота)
                const response = await fetch('https://sportapi7.p.rapidapi.com/api/v1/player/817181/unique-tournament/132/season/65360/ratings', options);
                const data = await response.json();

                if (data.rating) {
                    document.getElementById('player-rating').innerText = data.rating;
                } else {
                    document.getElementById('player-rating').innerText = "Н/Д";
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('update-time').innerText = "Обновлено: " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error(err);
                alert("Ошибка при загрузке данных. Проверьте VPN.");
            }
        }

        // Авто-загрузка при старте
        loadData();
    </script>
</body>
</html>
