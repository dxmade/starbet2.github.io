<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Stats</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000; /* Темная тема */
            color: white;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .rating {
            color: #4cd964; /* Зеленый цвет для рейтинга */
            font-weight: bold;
            font-size: 1.2em;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>⭐️ Рейтинги игроков</h2>
    <div id="stats-container">
        <p>Загрузка данных...</p>
    </div>
    <button onclick="fetchData()">Обновить данные</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        async function fetchData() {
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': '0bc1450aaemsh5f9908516db2655p12ebf3jsnbc91931d708a',
                    'x-rapidapi-host': 'sportapi7.p.rapidapi.com'
                }
            };

            try {
                // Пример запроса для одного игрока (из твоего скриншота)
                const response = await fetch('https://sportapi7.p.rapidapi.com/api/v1/player/817181/unique-tournament/132/season/65360/ratings', options);
                const data = await response.json();
                
                // Простая отрисовка данных
                const container = document.getElementById('stats-container');
                container.innerHTML = `
                    <div class="card">
                        <div>Текущий рейтинг: <span class="rating">${data.rating || 'N/A'}</span></div>
                        <div style="font-size: 0.8em; color: #888; margin-top: 5px;">Сезон: 25/26</div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
            }
        }

        fetchData(); // Загружаем при старте
    </script>
</body>
</html>
